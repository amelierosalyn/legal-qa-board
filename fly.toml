# fly.toml app configuration file generated for legal-qa-board on 2026-07-01T07:26:19Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'legal-qa-board'
primary_region = 'iad'
console_command = '/rails/bin/rails console'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
